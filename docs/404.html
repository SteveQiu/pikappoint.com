<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PikAppoint</title>
    <script>
      // SPA routing fix for GitHub Pages.
      // Redirects all 404s back to index.html with the path encoded as a query param.
      // Exception: allow direct access to static .html files.
      var l = window.location;
      if (!l.pathname.endsWith('.html')) {
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1).join('/') +
          '/?/' + l.pathname.slice(1).replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
    </script>
  </head>
  <body></body>
</html>
